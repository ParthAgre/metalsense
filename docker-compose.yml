version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: metalsense-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Sahil1205}
      MYSQL_DATABASE: metalsense_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
