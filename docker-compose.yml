version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: metalsense-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Sahil1205}
      POSTGRES_DB: metalsense_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
